<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Manager</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-gradient-to-br from-sky-100 via-emerald-50 to-fuchsia-100 text-slate-900">

<!-- NAVBAR -->

<nav class="sticky top-0 z-10 backdrop-blur bg-white/70 border-b border-white/60">
<div class="max-w-6xl mx-auto flex items-center justify-between px-4 py-4">

<div class="flex items-center gap-3">
    <div class="h-10 w-10 rounded-2xl bg-gradient-to-br from-sky-500 to-fuchsia-500 shadow-sm"></div>
    <div>
        <h1 class="text-lg sm:text-xl font-extrabold tracking-tight">
        Project Manager
        </h1>
        <p class="text-xs text-slate-600 -mt-0.5">Tu portafolio, más alegre</p>
    </div>
</div>

<div id="logBtn">

</div>

</div>
</nav>

<div class="max-w-6xl mx-auto px-4 py-10">

<div class="mb-8">
    <h2 class="text-2xl sm:text-3xl font-black tracking-tight">
        Proyectos
    </h2>
    <p class="text-slate-600 mt-1">
        Explora el listado y abre el detalle para ver más.
    </p>
</div>

<!-- FORMULARIO -->

<div id="createProjectBox" class="hidden bg-white/80 backdrop-blur p-6 rounded-2xl shadow-lg shadow-slate-900/5 border border-white/60 mb-8">

</div>

<!-- GRID DE PROYECTOS -->

<div
id="projectsContainer"
class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">

</div>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
